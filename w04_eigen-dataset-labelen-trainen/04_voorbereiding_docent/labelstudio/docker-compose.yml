version: "3.9"

services:
  labelstudio:
    image: heartexlabs/label-studio:latest
    container_name: labelstudio-workshop4
    ports:
      - "${LS_PORT:-8080}:8080"
    environment:
      - LABEL_STUDIO_USERNAME=${LS_USERNAME:-admin@local}
      - LABEL_STUDIO_PASSWORD=${LS_PASSWORD:-admin123}
      - LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED=true
      - LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT=/label-studio/data
    volumes:
      - ./data:/label-studio/data
    restart: unless-stopped
